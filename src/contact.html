<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/normalize.css">

    <title>Crypto Conversor</title>

</head>

<body>
    <header class="cemporcento cor1">
        <!--Inicio do cabecalho-->
        <div class="container-sm" id="topo">

            <nav class="nav-bar navbar-expand-md navbar-dark cabecalho">

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navegacao"
                    aria-controls="navegacao" aria-label="toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div id="topo">
                    <div class="collapse navbar-collapse" id="navegacao">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link" aria-current="page" href="index.html">home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="conversor.html">conversor</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link active" href="contact.html">contato</a>
                            </li>
                        </ul>
                        <div class="input-group entrar">
                            <a class="btn btn-lg cor-btn user" href="log-in.html" type="submit" value="entrar">Entrar</a>
                            <a class="btn btn-lg cor-btn user" href="create-account.html" type="submit" value="Criar conta">Criar conta</a>
                        </div>
                    </div>
                </div>

            </nav>
        </div>
    </header>
    <!--Final do cabecalho-->

    <main>
        <!--area principal-->
        <section>
            <div class="cemporcento cor2">
                <!-- Inicio da primeira sessao -->
                <section class="container-md">
                    <div>
                        <!-- Formulário de Contato -->
                        <div id="title" class="espaco">
                            <h1 class="crypto">Envie sua</h1>
                            <h1><span class="title">Mensagem</span></h1>
                        </div>
                        <section class="container-md form-custom">
                            <form>
                                <div class="mb-3">
                                    <label for="contactName" class="form-label">
                                        <h3>Seu Nome</h3>
                                    </label>
                                    <input type="text" class="form-control user2" id="contactName"
                                        placeholder="diga-nos seu nome..." required>
                                </div>
                                <div class="mb-3">
                                    <label for="contactEmail" class="form-label">
                                        <h4>Seu E-mail</h4>
                                    </label>
                                    <input type="email" class="form-control user2" id="contactEmail"
                                        placeholder="digite aqui seu e-mail..." required>
                                </div>
                                <div class="mb-3">
                                    <label for="contactPhone" class="form-label">
                                        <h4>Seu telefone de contato</h4>
                                    </label>
                                    <input type="tel" class="form-control user2" id="contactPhone"
                                        placeholder="digite aqui seu telefone, se desejar...">
                                </div>
                                <div class="mb-3">
                                    <label for="contactSubject" class="form-label">
                                        <h4>Diga-nos o assunto de interesse</h4>
                                    </label>
                                    <input type="text" class="form-control user2" id="contactSubject"
                                        placeholder="sobre o que você gostaria de falar?" required>
                                </div>
                                <div class="mb-3">
                                    <label for="contactMessage" class="form-label">
                                        <h2>Escreva sua mensagem aqui</h2>
                                    </label>
                                    <textarea class="form-control user2" id="contactMessage" rows="3"
                                        placeholder="Digite sua mensagem, respondere-mos o mais breve possível!" required></textarea>

                                    <input class="btn btn-lg cor-btn user espaco" type="submit"
                                        value="Enviar minha mensagem >">
                                </div>
                            </form>
                        </section>
                    </div>
                </section>
            </div>
        </section>
        <!-- Mapa de Localização-->
        <section class="cemporcento cor4">
            <!-- Inicio da primeira sessao -->
            <div class="container-md">
                <h1 class="nossos-servicos">Nossa Localização</h1>
                <p class="text-center" style="color: #f8fafc; font-size: 1.1rem; margin-top: -0.5rem; margin-bottom: 1rem; line-height: 1.6;">
                    Facens - Rodovia Senador Jose Ermirio de Moraes, 1425 - Alto da Boa Vista<br>
                    Sorocaba - SP, 18087-125
                </p>
                <div class="local espaco">
                    <iframe
                        src="https://maps.google.com/maps?q=Facens%20Sorocaba&t=&z=15&ie=UTF8&iwloc=&output=embed"
                        width="70%" height="400" allowfullscreen="" loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </div>
        </section>
        <!-- fim da area de conteudo-->
    </main>


    <!--fim area principal-->
    <footer class="cemporcento cor1">
        <!-- inicio do rodape -->
        <section class="rodape">
            <div class="m-s container-md">
                <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
                <a href="#" aria-label="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
            </div>
        </section>
    </footer> <!-- Final do rodape -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/js/all.min.js"
        integrity="sha512-8iMpM3Bf7X2gmb8d+u3BIVjVVcqUY7FxfHPSqJpEUyA3fpxCzvgJxsxkREXLPlbHQgvJ8PNgbhTI3k8CXjbVA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>

</body>

</html>
