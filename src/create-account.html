<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/normalize.css">
    <title>Criar Conta | Crypto Conversor</title>
    <meta name="description" content="Crie sua conta no Crypto Conversor para salvar preferencias e acessar recursos da plataforma.">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Crypto Conversor">
    <link rel="canonical" href="https://crypto-conversor-main.vercel.app/create-account.html">

    <meta property="og:title" content="Criar Conta | Crypto Conversor">
    <meta property="og:description" content="Abra sua conta no Crypto Conversor em poucos passos.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://crypto-conversor-main.vercel.app/create-account.html">
    <meta property="og:site_name" content="Crypto Conversor">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:image" content="https://crypto-conversor-main.vercel.app/images/logo-adulto.svg">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Criar Conta | Crypto Conversor">
    <meta name="twitter:description" content="Abra sua conta no Crypto Conversor em poucos passos.">
    <meta name="twitter:image" content="https://crypto-conversor-main.vercel.app/images/logo-adulto.svg">

</head>

<body>
    <header class="cemporcento cor1">
        <!--Inicio do cabecalho-->
        <div class="container-sm" id="topo">

            <nav class="nav-bar navbar-expand-md navbar-dark cabecalho">

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navegacao"
                    aria-controls="navegacao" aria-label="toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div id="topo">
                    <div class="collapse navbar-collapse" id="navegacao">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link" aria-current="page" href="index.html">home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="conversor.html">conversor</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="contact.html">contato</a>
                            </li>
                        </ul>
                        <div class="input-group entrar">
                            <a class="btn btn-lg cor-btn user" href="log-in.html" type="submit" value="entrar">Entrar</a>
                            <a class="btn btn-lg cor-btn user" href="create-account.html" type="submit" value="Criar conta">Criar conta</a>
                        </div>
                    </div>

                </div>

            </nav>
        </div>
    </header>
    <!--Final do cabecalho-->

    <main>
        <div>
            <div class="cemporcento cor2">
                <!-- Inicio da sessao Log in-->
                <section class="container-md espaco2 login text-center form-login">

                    <div class="form-control form-control-lg form-login user2">

                        <form action="">
                            <img class="logo-img espaco3" src="images/logo-adulto.svg" alt="Logo Crypto Conversor">

                            <h4 class="title">Criar Conta</h4>

                            <fieldset>
                                <legend>Digite seu E-mail</legend>
                                <label for="endereco-email" class="sr-only">Usuário</label>
                                <input type="email" id="endereco-email" name="email" class="form-control espaco3 user2"
                                    placeholder="Digite seu E-mail aqui" required autofocus onchange="confereDados();">

                                <legend>Confirme seu E-mail</legend>
                                <label for="endereco-email-confirmacao" class="sr-only">Usuário</label>
                                <input type="email" id="endereco-email-confirmacao" name="email2" class="form-control espaco3 user2"
                                    placeholder="Digite novamente seu E-mail" required autofocus onchange="confereDados();">

                                <legend>Senha</legend>
                                <label for="senha" class="sr-only">Senha</label>
                                <input type="password" id="senha" name="senha" placeholder="Digite sua senha aqui"
                                    class="form-control espaco3 user2" onchange="confereDados();">

                                <legend>Confirme sua Senha</legend>
                                <label for="senha-confirmacao" class="sr-only">Senha</label>
                                <input type="password" id="senha-confirmacao" name="senha2" placeholder="Digite novamente sua senha"
                                    class="form-control espaco3 user2" onchange="confereDados();">
                            </fieldset>

                            <div class="form-check form-switch">
                                <label class="form-check-label">
                                    <h3> <input type="checkbox" class="form-check-input" value="Lembrar de mim"> Lembrar
                                        de mim </h3>
                                </label>
                            </div>

                            <div class="espaco3">
                                <button class="btn btn-lg cor-btn user btn-login">Criar Minha Conta</button>
                            </div>

                        </form>
                    </div>

                </section>

            </div>
            <!--Final da sessao Log in-->
        </div>
    </main>

    <footer class="cemporcento cor1">
        <!-- inicio do roda pe -->
        <section class="rodape">
            <div class="m-s container-md">
                <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
                <a href="#" aria-label="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
            </div>
        </section>
    </footer> <!-- Final do roda pe -->


    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/js/all.min.js"
        integrity="sha512-8iMpM3Bf7X2gmb8d+u3BIVjVVcqUY7FxfHPSqJpEUyA3fpxCzvgJxsxkREXLPlbHQgvJ8PNgbhTI3k8CXjbVA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
    <script src="js/create-account.js"></script>
</body>

</html>
